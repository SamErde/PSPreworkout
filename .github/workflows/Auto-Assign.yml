name: 👷‍♂️ Auto-Assign Issues and PRs
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit

    - name: '👷‍♂️ Auto-assign Issue'
      uses: pozil/auto-assign-issue@21ffb634481e75f2557e5f507e359cba97bbc42b # v2
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          numOfAssignee: 1
          assignees: ${{ vars.DEFAULT_ISSUE_ASSIGNEE }}
          allowSelfAssign: true
    - name: '👷‍♂️ Auto-assign PR'
      uses: pozil/auto-assign-issue@21ffb634481e75f2557e5f507e359cba97bbc42b # v2
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          numOfAssignee: 1
          assignees: ${{ vars.DEFAULT_PR_ASSIGNEE }}
          allowSelfAssign: true
